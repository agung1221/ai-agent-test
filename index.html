  docId: '1MD_-qfxGrwFgQleaRgo3uBT-gH_7Prz08R1Vuhkg3LI',

function doPost(e) {
  try {
    if (!e || !e.postData || !e.postData.contents) {
      return responseJSON({ status: 'error', message: 'No data received' });
    }

    const data = JSON.parse(e.postData.contents);
    
    // Rute action dari frontend (jika masih pakai form manual)
    if (data.action === 'chat') return handleChat(data);
    if (data.action === 'booking') return responseJSON(processBookingLogic(data));
    
    return responseJSON({ status: 'error', message: 'Invalid action' });
  } catch (error) {
    return responseJSON({ status: 'error', message: "Internal Server Error" });
  }
}

/**
 * ==========================================
 * FITUR AI CHAT (BOOKING & RESCHEDULE)
 * ==========================================
 */
function handleChat(data) {
  const userMessage = data.message;
  const historyFromFrontend = data.history || []; 
  const knowledge = getKnowledge();
  
  let aiReply = callAI(userMessage, knowledge, historyFromFrontend);
  let finalReplyToUser = aiReply;

  // Deteksi JSON Intent dari balasan AI
  try {
    const jsonMatch = aiReply.match(/\{[\s\S]*\}/);
    if (jsonMatch) {
      const aiIntentData = JSON.parse(jsonMatch[0]);
      
      // JIKA INTENT = BOOKING BARU
      if (aiIntentData.intent === 'booking') {
        const bookingResult = processBookingLogic(aiIntentData);
        if (bookingResult.status === 'success') {
          finalReplyToUser = `🎉 Jadwal konsultasi Anda telah berhasil dikonfirmasi untuk tanggal ${aiIntentData.date}.\n\nUndangan Google Meet sudah saya kirimkan ke email Anda (${aiIntentData.email}). Ada hal lain yang ingin didiskusikan?`;
        } else {
          finalReplyToUser = `Mohon maaf, jadwal tidak bisa diproses: ${bookingResult.message}. Silakan pilih jam atau hari yang lain.`;
        }
      } 
      // JIKA INTENT = RESCHEDULE
      else if (aiIntentData.intent === 'reschedule') {
        const rescheduleResult = processRescheduleLogic(aiIntentData);
        if (rescheduleResult.status === 'success') {
          finalReplyToUser = `✅ Jadwal atas nama ${rescheduleResult.name} berhasil diubah ke tanggal ${aiIntentData.date}.\n\nPerubahan otomatis terupdate di Google Calendar Anda dengan link Meet yang sama. Ada lagi yang bisa saya bantu?`;
        } else {
          finalReplyToUser = `Mohon maaf, gagal mengubah jadwal: ${rescheduleResult.message}`;
        }
      }
    }
  } catch (e) {
    // Balasan teks biasa, tidak ada eksekusi sistem
  }

  return responseJSON({ reply: finalReplyToUser });
}

function callAI(message, knowledge, chatHistory) {
  const apiKey = PropertiesService.getScriptProperties().getProperty("AI_API_KEY");
  if (!apiKey) return "Konfigurasi sistem belum lengkap.";

  const todayStr = Utilities.formatDate(new Date(), Session.getScriptTimeZone(), "yyyy-MM-dd");

  const systemPrompt = `
Anda adalah AI Consultant dari AgungAI. Hari ini tanggal ${todayStr}.
Knowledge Base: ${knowledge}.

ATURAN SANGAT PENTING:
Aturan jadwal: Maksimal 3 slot sehari, jeda antar sesi minimal 2 jam.
Jika data terkumpul, JANGAN balas teks, tapi WAJIB keluarkan HANYA format JSON.

1. INTENT BOOKING BARU
Data wajib: Nama, Email, Tanggal & Jam.
Format:
{"intent": "booking", "name": "Budi", "email": "budi@email.com", "date": "2024-05-15T10:00:00", "notes": "-"}

2. INTENT RESCHEDULE (Ubah Jadwal)
Jika user ingin ubah jadwal, Anda hanya perlu meminta EMAIL dan TANGGAL/JAM BARU. Tidak perlu tanya nama lagi.
Format:
{"intent": "reschedule", "email": "budi@email.com", "date": "2024-05-20T14:00:00"}
`;

  let messagesPayload = [{ "role": "system", "content": systemPrompt }];
  if (chatHistory.length > 0) messagesPayload = messagesPayload.concat(chatHistory);
  messagesPayload.push({ "role": "user", "content": message });

  const payload = { "model": CONFIG.aiModel, "messages": messagesPayload, "temperature": 0.2, "max_tokens": 500 };
  const options = { "method": "post", "contentType": "application/json", "headers": { "Authorization": "Bearer " + apiKey }, "payload": JSON.stringify(payload), "muteHttpExceptions": true };

  try {
    const response = UrlFetchApp.fetch(CONFIG.aiEndpoint, options);
    const json = JSON.parse(response.getContentText());
    if (json.error) return "Maaf, saya sedang mengalami kendala teknis.";
    return (json.choices && json.choices.length > 0) ? json.choices[0].message.content : "Tidak ada jawaban.";
  } catch (error) { return "Maaf, koneksi AI terputus."; }
}

function getKnowledge() {
  try { return DocumentApp.openById(CONFIG.docId).getBody().getText(); } 
  catch (error) { return "Knowledge base error."; }
}

/**
 * ==========================================
 * LOGIKA BOOKING & RESCHEDULE (HANYA 1 SHEET)

// 1. Logika Pembuatan Booking Baru
function processBookingLogic(data) {
  const lock = LockService.getScriptLock();
  try {
    lock.waitLock(10000); 
    const checkResult = checkDynamicSchedule(data.date);
    if (!checkResult.available) return { status: 'error', message: checkResult.message };

    const eventId = createCalendarEvent(data.name, data.email, data.date, data.notes);
    if (!eventId) throw new Error("Gagal membuat Calendar Event.");

    saveBooking(data, eventId);
    return { status: 'success', message: 'Booking berhasil' };
  } catch (error) {
    return { status: 'error', message: error.message };
  } finally {
    lock.releaseLock();
  }
}

// 2. Logika Ubah Jadwal (Reschedule)
function processRescheduleLogic(data) {
  const lock = LockService.getScriptLock();
  try {
    lock.waitLock(10000);
    const sheet = SpreadsheetApp.openById(CONFIG.sheetId).getSheetByName('bookings');
    const values = sheet.getDataRange().getValues();
    
    let targetRow = -1;
    let oldEventId = null;
    let clientName = "";

    // Cari booking berdasarkan email (dari bawah ke atas agar mendapat jadwal paling baru)
    for (let i = values.length - 1; i >= 1; i--) {
      // Kolom index 2 adalah Email
      if (values[i][2].toString().toLowerCase() === data.email.toLowerCase()) {
        targetRow = i + 1; // Baris di sheet mulai dari 1
        clientName = values[i][1]; // Kolom index 1 adalah Nama
        oldEventId = values[i][6]; // Kolom index 6 adalah Event ID Google Calendar
        break;
      }
    }

    if (targetRow === -1 || !oldEventId) {
      return { status: 'error', message: 'Email tidak ditemukan dalam sistem kami.' };
    }

    // Cek jadwal dinamis (Tapi kecualikan Event ID ini, agar tidak bentrok dengan dirinya sendiri)
    const checkResult = checkDynamicSchedule(data.date, oldEventId);
    if (!checkResult.available) return { status: 'error', message: checkResult.message };

    // Update Jam Google Calendar (TIDAK buat link meet baru, cukup geser jam)
    const startTime = new Date(data.date);
    const endTime = new Date(startTime.getTime() + (60 * 60 * 1000));
    
    Calendar.Events.patch({
      start: { dateTime: startTime.toISOString() },
      end: { dateTime: endTime.toISOString() }
    }, CONFIG.calendarId, oldEventId, { sendUpdates: 'all' });

    // Update Kolom Tanggal (Kolom ke-4/D) di Sheet
    sheet.getRange(targetRow, 4).setValue(data.date);
    // (Opsional) Kasih tanda di notes bahwa ini sudah direschedule
    const currentNotes = sheet.getRange(targetRow, 5).getValue();
    sheet.getRange(targetRow, 5).setValue(currentNotes + " [Rescheduled to " + data.date + "]");

    return { status: 'success', name: clientName };
  } catch (error) {
    Logger.log("Reschedule Error: " + error.message);
    return { status: 'error', message: error.message };
  } finally {
    lock.releaseLock();
  }
}

// 3. Logika Cek Jadwal (Dengan Pengecualian ID untuk Reschedule)
function checkDynamicSchedule(requestedIsoDate, excludeEventId = null) {
  const reqDate = new Date(requestedIsoDate);
  const reqDateStr = Utilities.formatDate(reqDate, Session.getScriptTimeZone(), "yyyy-MM-dd");
  const reqTimeMs = reqDate.getTime();

  const sheet = SpreadsheetApp.openById(CONFIG.sheetId).getSheetByName('bookings');
  const data = sheet.getDataRange().getValues();

  let sameDayCount = 0;

  for (let i = 1; i < data.length; i++) {
    const rowEventId = data[i][6]; // Ambil event ID
    
    // Jika sedang Reschedule, abaikan event miliknya sendiri dari pengecekan
    if (excludeEventId && rowEventId === excludeEventId) continue;

    const bookedDateVal = new Date(data[i][3]);
    if (isNaN(bookedDateVal)) continue;

    const bookedDateStr = Utilities.formatDate(bookedDateVal, Session.getScriptTimeZone(), "yyyy-MM-dd");

    if (reqDateStr === bookedDateStr) {
      sameDayCount++;
      const bookedTimeMs = bookedDateVal.getTime();
      const diffHours = Math.abs(reqTimeMs - bookedTimeMs) / (1000 * 60 * 60);

      if (diffHours < 2) {
        return { available: false, message: "Jadwal terlalu dekat dengan sesi lain (minimal jeda 2 jam)." };
      }
    }
  }

  if (sameDayCount >= 3) {
    return { available: false, message: "Kuota harian sudah penuh (maksimal 3 sesi/hari)." };
  }

  return { available: true, message: "Tersedia" };
}

function createCalendarEvent(name, email, dateStr, notes) {
  try {
    const startTime = new Date(dateStr);
    const endTime = new Date(startTime.getTime() + (60 * 60 * 1000));
    
    const eventResource = {
      summary: "Konsultasi AI Automation - " + name,
      description: `Agenda: Konsultasi AI\nCatatan: ${notes || '-'}\n\nLink Google Meet tersedia.`,
      start: { dateTime: startTime.toISOString() },
      end: { dateTime: endTime.toISOString() },
      attendees: [{ email: email }],
      conferenceData: {
        createRequest: { requestId: Utilities.getUuid(), conferenceSolutionKey: { type: "hangoutsMeet" } }
      }
    };
    const event = Calendar.Events.insert(eventResource, CONFIG.calendarId, { conferenceDataVersion: 1, sendUpdates: 'all' });
    return event.id;
  } catch (error) { throw new Error("Gagal membuat Calendar Event."); }
}

function saveBooking(data, eventId) {
  SpreadsheetApp.openById(CONFIG.sheetId).getSheetByName('bookings').appendRow([
    new Date(), data.name, data.email, data.date, data.notes || '', 'confirmed', eventId
  ]);
}

function responseJSON(data) {
  return ContentService.createTextOutput(JSON.stringify(data)).setMimeType(ContentService.MimeType.JSON);
}

function doOptions(e) {
  return ContentService.createTextOutput("").setMimeType(ContentService.MimeType.TEXT)
    .setHeaders({ "Access-Control-Allow-Origin": "*", "Access-Control-Allow-Methods": "POST, GET, OPTIONS", "Access-Control-Allow-Headers": "Content-Type" });
}";
        
        // Generate Session ID acak untuk Chat
        const SESSION_ID = 'sess-' + Math.random().toString(36).substr(2, 9);
        document.getElementById('session-display').innerText = `Session: ${SESSION_ID}`;

        // Utility: Fetch ke GAS (Trick CORS dengan text/plain)
        async function fetchAPI(payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    // Menggunakan text/plain agar tidak memicu strict CORS preflight di browser
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                throw new Error("Gagal terhubung ke server.");
            }
        }

        // Utility: Show Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
            toast.className = `${bgColor} text-white px-6 py-3 rounded shadow-lg toast-enter flex items-center`;
            toast.innerHTML = message;
            
            const container = document.getElementById('toast-container');
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

                // ================= LOGIC CHAT (DENGAN MEMORY LOKAL) =================
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');
        const chatBtn = document.getElementById('chat-btn');

        // ARRAY UNTUK MENYIMPAN MEMORI PERCAKAPAN DI BROWSER
        let localChatHistory = [];

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            const bubble = document.createElement('div');
            bubble.className = sender === 'user' 
                ? 'bg-blue-600 text-white px-4 py-2 rounded-lg rounded-tr-none max-w-[80%]' 
                : 'bg-gray-100 text-gray-800 px-4 py-2 rounded-lg rounded-tl-none max-w-[80%] whitespace-pre-wrap';
            
            bubble.innerText = text;
            div.appendChild(bubble);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            // Update UI & Simpan ke Memory Lokal (User)
            appendMessage('user', message);
            localChatHistory.push({ role: "user", content: message });
            
            chatInput.value = '';
            chatBtn.disabled = true;
            chatBtn.innerText = '...';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'flex justify-start text-sm text-gray-500 italic';
            loadingDiv.innerText = 'AI sedang mengetik...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Jaga agar memory tidak terlalu panjang (Maksimal ambil 8 chat terakhir saja)
                const historyToSent = localChatHistory.slice(-8);

                // Kirim pesan beserta memori ke backend
                const res = await fetchAPI({ 
                    action: 'chat', 
                    message: message, 
                    history: historyToSent // Parameter history dikirim ke Apps Script
                });
                
                loadingDiv.remove();
                
                if(res.reply) {
                    appendMessage('ai', res.reply);
                    // Simpan balasan AI ke Memory Lokal
                    localChatHistory.push({ role: "assistant", content: res.reply });
                } else {
                    appendMessage('ai', "Error: Tidak ada balasan dari server.");
                }
            } catch (err) {
                loadingDiv.remove();
                appendMessage('ai', "Maaf, terjadi kesalahan jaringan.");
            } finally {
                chatBtn.disabled = false;
                chatBtn.innerText = 'Kirim';
            }
        });
        
        // ================= LOGIC BOOKING =================
        const bookingForm = document.getElementById('booking-form');
        const btnBooking = document.getElementById('btn-booking');

        bookingForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnBooking.disabled = true;
            btnBooking.innerHTML = 'Memproses...';

            // Ambil format datetime local (YYYY-MM-DDTHH:mm)
            const dateVal = document.getElementById('b-date').value;
            // Ubah ke format ISO yang sesuai dengan Google Calendar (tambah detik :00)
            const isoDate = dateVal + ":00"; 

            const payload = {
                action: 'booking',
                name: document.getElementById('b-name').value,
                email: document.getElementById('b-email').value,
                date: isoDate,
                notes: document.getElementById('b-notes').value
            };

            try {
                const res = await fetchAPI(payload);
                if (res.status === 'success') {
                    showToast('✅ Booking Berhasil Dibuat!', 'success');
                    bookingForm.reset();
                } else {
                    showToast('❌ ' + (res.message || 'Gagal membuat booking'), 'error');
                }
            } catch (err) {
                showToast('❌ Error jaringan.', 'error');
            } finally {
                btnBooking.disabled = false;
                btnBooking.innerHTML = 'Proses Booking';
            }
        });

        // ================= LOGIC LEAD =================
        const leadForm = document.getElementById('lead-form');
        const btnLead = document.getElementById('btn-lead');

        leadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnLead.disabled = true;
            btnLead.innerHTML = 'Menyimpan...';

            const payload = {
                action: 'save_lead',
                name: document.getElementById('l-name').value,
                email: document.getElementById('l-email').value,
                interest: document.getElementById('l-interest').value,
                source: "Manual Frontend"
            };

            try {
                const res = await fetchAPI(payload);
                if (res.status === 'success') {
                    showToast('✅ Data Lead Tersimpan!', 'success');
                    leadForm.reset();
                } else {
                    showToast('❌ Gagal menyimpan lead', 'error');
                }
            } catch (err) {
                showToast('❌ Error jaringan.', 'error');
            } finally {
                btnLead.disabled = false;
                btnLead.innerHTML = 'Simpan Lead';
            }
        });

    </script>
